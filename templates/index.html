<!DOCTYPE html>
<html>
<head>
    <title>Legal Search Engine</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 40px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        input, select {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            width: 200px;
        }

        button {
            padding: 12px 20px;
            border: none;
            background: #4a6cf7;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #3b5be0;
        }

        .results {
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .title {
            font-size: 18px;
            font-weight: 600;
        }

        .meta {
            font-size: 14px;
            color: #777;
            margin-top: 5px;
        }

        .preview {
            margin-top: 10px;
            color: #333;
        }

        .link {
            margin-top: 12px;
            display: inline-block;
            color: #4a6cf7;
            text-decoration: none;
            font-weight: 500;
        }

        .link:hover {
            text-decoration: underline;
        }

        .loader {
            text-align: center;
            display: none;
        }
    </style>
</head>

<body>

<h1>⚖️ Legal Case Search</h1>

<div class="search-box">
    <input type="text" id="query" placeholder="Search cases...">
    <input type="text" id="year" placeholder="Year">

    <select id="court">
        <option value="">All Courts</option>
        <option value="Supreme Court">Supreme Court</option>
        <option value="High Court">High Court</option>
        <option value="District Court">District Court</option>
    </select>

    <button onclick="search()">Search</button>
</div>

<div class="loader" id="loader">🔍 Searching...</div>

<div class="results" id="results"></div>

<script>
async function search() {

    const q = document.getElementById("query").value;
    const year = document.getElementById("year").value;
    const court = document.getElementById("court").value;

    let url = `/search?q=${q}`;

    if (year) url += `&year=${year}`;
    if (court) url += `&court=${court}`;

    document.getElementById("loader").style.display = "block";

    const res = await fetch(url);
    const data = await res.json();

    document.getElementById("loader").style.display = "none";

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    if (data.length === 0) {
        resultsDiv.innerHTML = "<p>No results found 😢</p>";
        return;
    }

    data.forEach(item => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="title">${item.title}</div>
            <div class="meta">${item.court} • ${item.year}</div>
            <div class="preview">${item.preview}...</div>
            <a class="link" href="${item.pdf_url}" target="_blank">📄 View Judgment</a>
        `;

        resultsDiv.appendChild(div);
    });
}
</script>

</body>
</html>
