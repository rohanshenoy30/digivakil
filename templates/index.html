<!DOCTYPE html>
<html>
<head>
    <title>Legal Search Engine</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }
        input {
            width: 300px;
            padding: 10px;
        }
        button {
            padding: 10px;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

<h1>⚖️ Legal Case Search</h1>

<form method="POST">
    <input type="text" name="query" placeholder="Search cases..." required>
    <button type="submit">Search</button>
</form>

{% for r in results %}
<div class="result">
    <h3>{{ r.title }}</h3>
    <p><b>Year:</b> {{ r.year }}</p>
    <p>{{ r.preview }}...</p>
</div>
{% endfor %}

</body>
</html>
