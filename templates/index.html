<!DOCTYPE html>
<html>
<head>
    <title>Legal Case Search + AI Chatbot</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fb;
            padding: 40px;
        }

        h1 {
            text-align: center;
        }

        .search-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        input, select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            background: #4a6cf7;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 15px auto;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .meta {
            color: gray;
            font-size: 14px;
        }

        /* CHAT UI */
        .chat-container {
            height: 250px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 10px;
            background: #fafafa;
            margin-bottom: 10px;
        }

        .chat-message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 12px;
            max-width: 70%;
        }

        .user {
            background: #4a6cf7;
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .bot {
            background: #e5e7eb;
            color: black;
            margin-right: auto;
        }

        .typing {
            font-style: italic;
            color: gray;
        }

        .chatbox {
            margin-top: 40px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
        }

        .chat-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .chat-input input {
            flex: 1;
        }
    </style>
</head>

<body>

<h1>⚖️ Legal Case Search + AI Chatbot</h1>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" id="query" placeholder="Search cases...">
    <input type="text" id="year" placeholder="Year">

    <select id="court">
        <option value="">All Courts</option>
        <option value="Supreme Court">Supreme Court</option>
        <option value="High Court">High Court</option>
        <option value="District Court">District Court</option>
    </select>

    <button onclick="search()">Search</button>
</div>

<div id="results"></div>

<!-- GLOBAL CHAT -->
<div class="chatbox">
    <h2>🤖 AI Chatbot</h2>

    <div id="chatBox" class="chat-container"></div>

    <div class="chat-input">
        <input id="chatInput" placeholder="Ask anything...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>

// ---------------- SEARCH ----------------
async function search() {
    const q = document.getElementById("query").value;
    const year = document.getElementById("year").value;
    const court = document.getElementById("court").value;

    let url = `/search?q=${q}`;
    if (year) url += `&year=${year}`;
    if (court) url += `&court=${court}`;

    const res = await fetch(url);
    const data = await res.json();

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    data.forEach(item => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div><b>${item.title}</b></div>
            <div class="meta">${item.court} • ${item.year}</div>
            <div>${item.preview}...</div>

            <a href="${item.pdf_url}" target="_blank">📄 View Judgment</a>

            <br><br>

            <div class="chat-container" id="chat-${item.id}"></div>

            <input type="text" id="q-${item.id}" placeholder="Ask about this case...">
            
            <button 
                data-preview="${encodeURIComponent(item.preview || '')}"
                data-content="${encodeURIComponent(item.content || '')}"
                onclick="askCaseQuestion('${item.id}', this)">
                Ask
            </button>
        `;

        resultsDiv.appendChild(div);
    });
}


// ---------------- GLOBAL CHAT ----------------
async function sendMessage() {
    const input = document.getElementById("chatInput");
    const chatBox = document.getElementById("chatBox");

    const message = input.value;
    if (!message) return;

    const userDiv = document.createElement("div");
    userDiv.className = "chat-message user";
    userDiv.innerText = message;
    chatBox.appendChild(userDiv);

    input.value = "";

    const typingDiv = document.createElement("div");
    typingDiv.className = "chat-message bot typing";
    typingDiv.innerText = "Gemini is typing...";
    chatBox.appendChild(typingDiv);

    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const res = await fetch("http://127.0.0.1:3000/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: message })
        });

        const data = await res.json();

        chatBox.removeChild(typingDiv);

        const botDiv = document.createElement("div");
        botDiv.className = "chat-message bot";
        botDiv.innerText = data.reply;
        chatBox.appendChild(botDiv);

    } catch (err) {
        chatBox.removeChild(typingDiv);

        const errorDiv = document.createElement("div");
        errorDiv.className = "chat-message bot";
        errorDiv.innerText = "⚠️ Error. Try again.";
        chatBox.appendChild(errorDiv);
    }

    chatBox.scrollTop = chatBox.scrollHeight;
}


// ---------------- CASE CHAT ----------------
async function askCaseQuestion(caseId, button) {
    const input = document.getElementById(`q-${caseId}`);
    const chatBox = document.getElementById(`chat-${caseId}`);

    const question = input.value;
    if (!question) return;

    const preview = decodeURIComponent(button.getAttribute("data-preview") || "");
    const content = decodeURIComponent(button.getAttribute("data-content") || "");

    // SMART CONTEXT
    let context = preview;

    if (
        question.toLowerCase().includes("detail") ||
        question.toLowerCase().includes("explain") ||
        question.toLowerCase().includes("full")
    ) {
        context = content.slice(0, 5000);
    }

    const userMsg = document.createElement("div");
    userMsg.className = "chat-message user";
    userMsg.innerText = question;
    chatBox.appendChild(userMsg);

    const typing = document.createElement("div");
    typing.className = "chat-message bot typing";
    typing.innerText = "Thinking...";
    chatBox.appendChild(typing);

    try {
        const res = await fetch("http://127.0.0.1:3000/case-chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                question: question,
                context: context
            })
        });

        const data = await res.json();

        chatBox.removeChild(typing);

        const botMsg = document.createElement("div");
        botMsg.className = "chat-message bot";
        botMsg.innerText = data.answer;
        chatBox.appendChild(botMsg);

    } catch (err) {
        chatBox.removeChild(typing);

        const errorMsg = document.createElement("div");
        errorMsg.className = "chat-message bot";
        errorMsg.innerText = "⚠️ Error";
        chatBox.appendChild(errorMsg);
    }

    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
}

</script>

</body>
</html>
